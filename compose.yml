---
# CoreWAF Starter Kit — the customer's docker compose stack.
#
# Boot sequence:
#
#   1. instance-init — privileged, one-shot. Probes the host (machine_id,
#                      hardware fingerprint, instance UUID, perf envelope),
#                      validates prereqs, renders the runtime configs from
#                      its bundled templates + your config.ini, exits.
#   2. caddy + caddy-bridge — long-running. Caddy boots in pre-provisioning
#                      mode; the bridge registers with the CoreWAF backend
#                      and waits to be provisioned.
#   3. alloy + valkey  — long-running, parallel. Telemetry begins flowing
#                      immediately, regardless of provisioning state.

x-logging: &x-default-logging
  driver: "json-file"
  options:
    max-size: "100m"
    max-file: "5"
    compress: "true"

networks:
  corewaf-edge:
    driver: bridge
  corewaf-internal:
    driver: bridge
    internal: true

volumes:
  caddy_data:
  caddy_config:
  caddy_logs:       # caddy access + coraza logs, read by alloy
  alloy_data:
  valkey_data:

services:

  # ------------------------------------------------------------------
  # Stage 1 — Privileged init (host probe + template render)
  # ------------------------------------------------------------------
  init:
    image: ghcr.io/ext-corero/waf/instance-init:latest
    container_name: corewaf-init
    privileged: true
    pid: host
    network_mode: host
    volumes:
      - ./:/workspace
      - /sys/class/dmi/id:/sys/class/dmi/id:ro
      - /etc/machine-id:/etc/machine-id:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: "no"
    logging: *x-default-logging

  # ------------------------------------------------------------------
  # Stage 2 — Caddy + Bridge (long-running, waits for backend provisioning)
  # ------------------------------------------------------------------
  caddy:
    image: ghcr.io/ext-corero/waf/caddy-waf:latest
    container_name: corewaf-caddy
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_RESOURCE
    ports:
      - "80:80"
      - "443:443"
    environment:
      REDIS_HOST: valkey
      REDIS_PORT: "6379"
    volumes:
      - ./runtime/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    networks:
      - corewaf-edge
      - corewaf-internal
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      init:
        condition: service_completed_successfully
      valkey:
        condition: service_started
    labels:
      corewaf.io/managed: "true"
    logging: *x-default-logging

  caddy-bridge:
    image: ghcr.io/ext-corero/waf/caddy-bridge:latest
    container_name: corewaf-bridge
    restart: unless-stopped
    env_file:
      - ./runtime/.env
    environment:
      SERVICE_HOST: 0.0.0.0
      SERVICE_PORT: 8090
      CADDY_ADMIN_URL: http://caddy:2019
      CADDY_CONTAINER_NAME: corewaf-caddy
      HWINFO_DIR: /workspace/runtime
      NAMESPACE: default
      HEARTBEAT_INTERVAL_SECONDS: 30
    volumes:
      - ./runtime:/workspace/runtime:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - corewaf-internal
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8090/health"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
    depends_on:
      init:
        condition: service_completed_successfully
      caddy:
        condition: service_started
    logging: *x-default-logging

  # ------------------------------------------------------------------
  # Stage 3 — Alloy + supporting services (parallel to caddy + bridge)
  # ------------------------------------------------------------------
  alloy:
    image: grafana/alloy:v1.7.5
    container_name: corewaf-alloy
    restart: unless-stopped
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - --disable-reporting
      - /etc/alloy/config.alloy
    volumes:
      - ./runtime/config.alloy:/etc/alloy/config.alloy:ro
      - alloy_data:/var/lib/alloy/data
      - caddy_logs:/caddy_logs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - corewaf-internal
    depends_on:
      init:
        condition: service_completed_successfully
    logging: *x-default-logging

  valkey:
    image: valkey/valkey:8
    container_name: corewaf-valkey
    restart: unless-stopped
    command: valkey-server --maxmemory 128mb --appendonly no
    volumes:
      - valkey_data:/data
    networks:
      - corewaf-internal
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping | grep PONG"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s
    depends_on:
      init:
        condition: service_completed_successfully
    logging: *x-default-logging
