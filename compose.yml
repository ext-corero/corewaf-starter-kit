---
# CoreWAF Starter Kit — the customer's docker compose stack.
#
# Boot sequence:
#
#   1. instance-init — privileged, one-shot. Probes the host (machine_id,
#                      hardware fingerprint, instance UUID, perf envelope),
#                      validates prereqs, renders the runtime configs from
#                      its bundled templates + your config.ini, exits.
#   2. caddy + caddy-bridge — long-running. Caddy boots in pre-provisioning
#                      mode; the bridge registers with the CoreWAF backend
#                      and waits to be provisioned.
#   3. alloy + valkey  — long-running, parallel. Telemetry begins flowing
#                      immediately, regardless of provisioning state.

x-logging: &x-default-logging
  driver: "json-file"
  options:
    max-size: "100m"
    max-file: "5"
    compress: "true"

networks:
  corewaf-edge:
    driver: bridge
  corewaf-internal:
    driver: bridge
    internal: true

volumes:
  caddy_data:
  caddy_config:
  caddy_logs:       # caddy access + coraza logs, read by alloy
  alloy_data:
  valkey_data:
  tunnel_state:     # WG keypair + redemption state. Survives
                    # `compose down`; `compose down -v` wipes it and
                    # forces fresh redemption (requires a new token).

services:

  # ------------------------------------------------------------------
  # Stage 1 — Privileged init (host probe + template render)
  # ------------------------------------------------------------------
  init:
    image: ghcr.io/ext-corero/waf/instance-init:latest
    container_name: corewaf-init
    privileged: true
    pid: host
    network_mode: host
    volumes:
      - ./:/workspace
      - /sys/class/dmi/id:/sys/class/dmi/id:ro
      - /etc/machine-id:/etc/machine-id:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: "no"
    logging: *x-default-logging

  # ------------------------------------------------------------------
  # Stage 1.5 — WireGuard tunnel (feature/tunnel-v0)
  # ------------------------------------------------------------------
  # Redeems the provisioning_token in config.ini for a tunnel config,
  # brings up wg0 in the host network namespace, and merges the
  # bridge's runtime credentials (apiEndpoint, zeroTrustApiKey, …)
  # into runtime/.env. Other long-running services depend on this via
  # service_healthy so they don't start with an unconfigured backend.
  tunnel:
    build:
      context: ./tunnel-client
      dockerfile: Dockerfile
    image: ghcr.io/ext-corero/waf/tunnel-client:latest
    container_name: corewaf-tunnel
    restart: unless-stopped
    network_mode: host                             # wg100 lives on host kernel
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    # sysctls don't work with network_mode: host; ip_forward is already
    # set on most hosts that run docker.
    environment:
      # Distinct interface so the kit can coexist with the rig's wg0
      # on the same host for end-to-end testing. Override per-deployment.
      WG_INTERFACE: wg100
      # Same-host testing override: narrow the route added by wg-quick
      # to just the server (avoids colliding with the rig's
      # `100.64.0.0/16 dev wg0`). Comment out for two-host deploys.
      TUNNEL_ALLOWED_IPS: 100.64.0.1/32
    volumes:
      - ./:/workspace                              # config.ini + runtime/.env
      - tunnel_state:/var/lib/tunnel               # keypair + state.json
      - /lib/modules:/lib/modules:ro               # WG kernel module access
    healthcheck:
      test: ["CMD", "/opt/tunnel-client/healthcheck.sh"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 30s
    depends_on:
      init:
        condition: service_completed_successfully
    logging: *x-default-logging

  # ------------------------------------------------------------------
  # Stage 2 — Caddy + Bridge (long-running, waits for backend provisioning)
  # ------------------------------------------------------------------
  caddy:
    image: ghcr.io/ext-corero/waf/caddy-waf:latest
    container_name: corewaf-caddy
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_RESOURCE
    ports:
      - "80:80"
      - "443:443"
    environment:
      REDIS_HOST: valkey
      REDIS_PORT: "6379"
    volumes:
      - ./runtime/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    networks:
      - corewaf-edge
      - corewaf-internal
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      init:
        condition: service_completed_successfully
      valkey:
        condition: service_started
    labels:
      corewaf.io/managed: "true"
    logging: *x-default-logging

  caddy-bridge:
    image: ghcr.io/ext-corero/waf/caddy-bridge:latest
    container_name: corewaf-bridge
    restart: unless-stopped
    env_file:
      - ./runtime/.env
    environment:
      SERVICE_HOST: 0.0.0.0
      SERVICE_PORT: 8090
      CADDY_ADMIN_URL: http://caddy:2019
      CADDY_CONTAINER_NAME: corewaf-caddy
      HWINFO_DIR: /workspace/runtime
      NAMESPACE: default
      HEARTBEAT_INTERVAL_SECONDS: 30
    volumes:
      - ./runtime:/workspace/runtime:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      # corewaf-internal: reach caddy admin + valkey inside the kit
      # corewaf-edge:     non-internal, so the bridge can dial the
      #                   API gateway (whether that's the host's caddy
      #                   ingress in same-host testing, or the rig's
      #                   tunnel IP / hostname in production)
      - corewaf-internal
      - corewaf-edge
    extra_hosts:
      # When API_GATEWAY_URL points at corewaf.localhost (same-host
      # demo against a local rig), make that name resolve to the
      # docker host's gateway IP so the bridge can actually reach it.
      # No-op for production deployments where API_GATEWAY_URL is a
      # real DNS name resolvable inside the container.
      - "corewaf.localhost:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8090/health"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
    depends_on:
      init:
        condition: service_completed_successfully
      caddy:
        condition: service_started
      tunnel:
        condition: service_healthy
    logging: *x-default-logging

  # ------------------------------------------------------------------
  # Stage 3 — Alloy + supporting services (parallel to caddy + bridge)
  # ------------------------------------------------------------------
  alloy:
    image: grafana/alloy:v1.7.5
    container_name: corewaf-alloy
    restart: unless-stopped
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - --disable-reporting
      - /etc/alloy/config.alloy
    volumes:
      - ./runtime/config.alloy:/etc/alloy/config.alloy:ro
      - alloy_data:/var/lib/alloy/data
      - caddy_logs:/caddy_logs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - corewaf-internal
    depends_on:
      init:
        condition: service_completed_successfully
    logging: *x-default-logging

  valkey:
    image: valkey/valkey:8
    container_name: corewaf-valkey
    restart: unless-stopped
    command: valkey-server --maxmemory 128mb --appendonly no
    volumes:
      - valkey_data:/data
    networks:
      - corewaf-internal
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping | grep PONG"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s
    depends_on:
      init:
        condition: service_completed_successfully
    logging: *x-default-logging
