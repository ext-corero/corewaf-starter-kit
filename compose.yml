---
# CoreWAF Starter Kit — customer-facing docker compose stack.
#
# MOUNT_DIR convention
# --------------------
# Every workspace bind mount in this stack uses ``${MOUNT_DIR:-${PWD}}``
# as its source. Operators normally don't set MOUNT_DIR — the default
# (``${PWD}``) makes the source the directory ``docker compose`` was
# launched from (i.e. the kit repo). Operators who run the kit out of
# a non-standard location can export MOUNT_DIR before invoking
# install.sh / compose to override it.
#
# The orchestrator service additionally mounts the workspace at the
# *same path* inside its container that the host sees on the outside
# (``${MOUNT_DIR}:${MOUNT_DIR}``). This is the alignment that lets the
# orchestrator's nested ``docker compose up`` calls pass relative
# bind-mount sources through to the host docker daemon without path
# translation — the orchestrator's view and the daemon's view of any
# given file path are identical by construction. Init and tunnel
# don't trigger nested bind mounts, so they can keep mounting at the
# legacy ``/workspace`` target.
#
# v2 boot sequence (foundation tier only; bridge stack and WAF stack
# are launched recursively once the orchestrator handoff is wired in
# Phase 2):
#
#   1. init  — privileged, one-shot. Network Loader image in `init`
#              mode probes the host (machine-id, hardware fingerprint,
#              deterministic UUIDv5 instance name) via the orchestrator
#              binary's `discover` verb. Writes discovery.json to the
#              tunnel-state volume, exits.
#   2. tunnel — long-lived. Network Loader image in `tunnel` mode.
#              Decodes the homing-token envelope, generates and
#              TPM-binds the kit's mTLS keypair via PKCS#11, generates
#              the WG keypair, redeems against the gateway, persists
#              the provisioning package + credentials at the handoff-
#              contract paths, brings up wg100 inside its own netns,
#              and runs the two-stage healthcheck plus daily /keepalive.
#   3. caddy + caddy-bridge + alloy + valkey — long-running, kept on
#              v0 shape until Phase 2 wires the orchestrator handoff
#              that launches them recursively from the bridge-stack
#              manifest.

x-logging: &x-default-logging
  driver: "json-file"
  options:
    max-size: "100m"
    max-file: "5"
    compress: "true"

networks:
  corewaf-edge:
    driver: bridge
  corewaf-internal:
    driver: bridge
    internal: true
  # kit-admin: shared between the foundation tunnel container and
  # the Phase 2 bridge stack (caddy-internal, caddy-bridge, alloy
  # all join the tunnel netns; valkey + future caddy-waf attach
  # to kit-admin directly). The tunnel container holds a NIC on
  # kit-admin so the netns-sharers can reach kit-admin services
  # via that NIC. Explicit `name:` so docker compose doesn't
  # project-prefix it; the bridge-stack compose references it by
  # bare name as `external: true`.
  kit-admin:
    driver: bridge
    name: kit-admin

volumes:
  # Shared between the foundation compose's caddy-waf service and the
  # orchestrator-launched bridge-stack (alloy reads caddy_logs;
  # caddy-internal writes ACME state into caddy_data). Declared here
  # (not external) so they're created at compose-up before either
  # consumer is up. The bridge-stack manifest declares the same names
  # with action=keep so the orchestrator's `run` finds them and
  # passes through. Explicit `name:` prevents docker compose's
  # project-prefix from breaking the cross-compose alias.
  caddy_data:    { name: caddy_data }
  caddy_config:  { name: caddy_config }
  caddy_logs:    { name: caddy_logs }
  # tunnel_state — WG keypair, /redeem package, mTLS cert, ZTK
  # secret. Explicit `name:` so docker compose doesn't project-
  # prefix it; the bridge-stack compose mounts it as external by
  # the bare name. Survives `compose down`; `compose down -v`
  # wipes it and forces fresh redemption (requires new token).
  tunnel_state:
    name: tunnel_state

services:

  # ------------------------------------------------------------------
  # Stage 1 — Host probe (Network Loader, init mode)
  # ------------------------------------------------------------------
  # Runs `network-loader init`, which is a thin wrapper around the
  # orchestrator binary's `discover` verb. Writes /var/lib/tunnel/
  # discovery.json atomically (machine-id, hardware fingerprint,
  # deterministic UUIDv5 instance name) for the tunnel container to
  # read on the next boot.
  init:
    image: ghcr.io/ext-corero/waf/network-loader:0.1.0
    container_name: corewaf-init
    command: ["init", "--output", "/var/lib/tunnel/discovery.json"]
    # init is the ONLY container in the kit that runs privileged
    # with host access. It probes the host (machine_id, hardware
    # fingerprint, network interfaces, kernel + CPU/memory) once,
    # writes /var/lib/tunnel/discovery.json, exits. Subsequent
    # containers (tunnel, orchestrator, bridge) drop to NET_ADMIN-
    # over-own-netns and consume the file. The privilege boundary
    # is intentional — host probes need root, the tunnel lifecycle
    # does not.
    privileged: true
    pid: host
    network_mode: host
    volumes:
      - ${MOUNT_DIR:-${PWD}}:/workspace
      - tunnel_state:/var/lib/tunnel
      # /host_proc and /host_sys: orchestrator's discovery package
      # detects these mounts (DefaultPaths in
      # orchestrator/internal/discovery/paths.go) and reads them
      # in preference to the container-local /proc + /sys, which
      # would otherwise reflect the container's view, not the host.
      - /proc:/host_proc:ro
      - /sys:/host_sys:ro
      # Identity sources read directly:
      - /sys/class/dmi/id:/sys/class/dmi/id:ro
      - /etc/machine-id:/etc/machine-id:ro
      - /var/lib/dbus/machine-id:/var/lib/dbus/machine-id:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: "no"
    logging: *x-default-logging

  # ------------------------------------------------------------------
  # Stage 1.5 — WireGuard tunnel (Network Loader, tunnel mode)
  # ------------------------------------------------------------------
  # Decodes config.ini's provisioning_token, generates and TPM-binds
  # the kit's mTLS keypair via PKCS#11, generates the WG keypair,
  # redeems against the operator gateway, persists artifacts at
  # /var/lib/tunnel/{package.json, secret/ztk, mtls/cert.pem,
  # mtls/pkcs11-uri, wg/private.key, wg/wg100.conf}, brings up wg100
  # inside this container's own netns, applies the kit-side firewall
  # ruleset from the gateway's firewallRules, and runs the two-stage
  # healthcheck plus daily /keepalive cron.
  #
  # Phase 2 will add an `orchestrator` service that depends on this
  # being healthy and launches the bridge stack via docker socket.
  tunnel:
    image: ghcr.io/ext-corero/waf/network-loader:0.1.0
    container_name: corewaf-tunnel
    command: ["tunnel"]
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    networks:
      # kit-admin attachment lets the bridge-stack containers (which
      # share this container's netns via `network_mode: container:`)
      # reach kit-admin services (valkey, eventually caddy-waf)
      # through the NIC they inherit from us.
      - kit-admin
    devices:
      # TPM device for the PKCS#11/TPM-bound mTLS keypair. Soft-TPM
      # (swtpm) substrate in the multi-VM fixture exposes /dev/tpm0
      # the same way; hardware path uses /dev/tpmrm0 on modern
      # kernels. Both are listed so the container picks whichever
      # the host provides.
      - /dev/tpmrm0:/dev/tpmrm0
      - /dev/tpm0:/dev/tpm0
    volumes:
      - ${MOUNT_DIR:-${PWD}}:/workspace            # config.ini + network.json + kit-version.json
      - tunnel_state:/var/lib/tunnel               # keypair + package.json + mtls + ztk
      - /lib/modules:/lib/modules:ro               # WG kernel module access
    healthcheck:
      # network-loader writes /var/lib/tunnel/.healthy after the
      # foundation-tier bring-up succeeds. Compose's `service_healthy`
      # gate uses this file's existence as the readiness signal.
      test: ["CMD", "test", "-f", "/var/lib/tunnel/.healthy"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 30s
    depends_on:
      init:
        condition: service_completed_successfully
    logging: *x-default-logging

  # ------------------------------------------------------------------
  # Stage 2 — Orchestrator handoff to the bridge stack
  # ------------------------------------------------------------------
  # Once the tunnel is healthy, run the orchestrator binary's
  # `compose up` against the bridge-stack manifest. This:
  #   - reads /etc/bootstrap (rendered by network-loader's tunnel
  #     mode from the /redeem package)
  #   - expands ${VAR} in manifests/bridge-stack/compose.yml
  #   - launches caddy-internal, caddy-bridge, alloy, valkey
  #
  # Uses the network-loader image as a strict superset of the
  # orchestrator base — the orchestrator binary is at
  # /usr/local/bin/orchestrator inside both. We override the
  # entrypoint to bypass network-loader's CLI dispatch.
  orchestrator:
    image: ghcr.io/ext-corero/waf/network-loader:0.1.0
    container_name: corewaf-orchestrator
    entrypoint: ["/usr/local/bin/orchestrator"]
    # MOUNT_DIR convention (see top-of-file comment): we bind-mount
    # the kit repo at the SAME path inside the orchestrator container
    # that the host sees on the outside. Relative bind-mount sources
    # in the bridge-stack compose (./runtime/config.alloy etc.) then
    # resolve to identical paths on both sides — when the orchestrator
    # asks the host docker daemon to bind-mount a rendered config,
    # the path translates trivially because there's nothing to
    # translate.
    # `run` (the heavy deploy verb), not `compose up`. Post-orchestrator
    # commit 6a0d7fc the `compose` verbs became operational primitives
    # — they no longer apply networks/volumes (that's `run`'s job).
    # The bridge stack needs the volumes declared in service.json
    # (caddy_data, caddy_config, caddy_logs, alloy_data, valkey_data)
    # created before docker-compose-up, so we invoke `run` which does:
    #   load manifest → build env → apply resources → render templates
    #   → docker compose up.
    # No `artifact` block in the bridge-stack manifest, so the OCI-pull
    # step is a no-op.
    command:
      - run
      - --service-dir=${MOUNT_DIR:-${PWD}}/manifests/bridge-stack
      - --manifest=${MOUNT_DIR:-${PWD}}/manifests/bridge-stack/service.json
      - --bootstrap=/var/lib/tunnel/bootstrap
    volumes:
      - ${MOUNT_DIR:-${PWD}}:${MOUNT_DIR:-${PWD}}
      - tunnel_state:/var/lib/tunnel:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      tunnel:
        condition: service_healthy
    restart: "no"
    logging: *x-default-logging

  # ------------------------------------------------------------------
  # Stage 3 — caddy-waf (the actual WAF instance).
  #
  # Lives in the foundation compose alongside init/tunnel/orchestrator
  # because operationally it's a peer of the bridge stack — the bridge
  # MUST tolerate caddy-waf being down or restarted (and vice versa).
  # Three-stack lifecycle independence per kit-v2 §1.13:
  #
  #   1. init + tunnel + orchestrator  (this compose, foundation)
  #   2. bridge-stack                  (launched by orchestrator from
  #                                     manifests/bridge-stack/)
  #   3. caddy-waf                     (this service, here)
  #
  # caddy-waf boots with a minimal Caddyfile baked into the image
  # (config-init/Caddyfile) — admin :2019 listening, /health on :80
  # for the allowlist. The bridge discovers it via the docker labels
  # below and PATCHes its real config via the admin API (the bridge
  # is a passive conduit; this kit doesn't carry an operator-shipped
  # Caddyfile). depends_on the orchestrator service ensures the shared
  # ``caddy_data`` / ``caddy_config`` / ``caddy_logs`` external volumes
  # have been created by the bridge-stack `run`, and valkey is up.
  # ------------------------------------------------------------------
  caddy-waf:
    image: ghcr.io/ext-corero/waf/caddy-waf:latest
    pull_policy: missing
    container_name: corewaf-caddy
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_RESOURCE
    ports:
      - "80:80"
      - "443:443"
    environment:
      # valkey is on kit-admin (brought up by the bridge-stack
      # orchestrator); resolve by service name in that network.
      REDIS_HOST: valkey
      REDIS_PORT: "6379"
    volumes:
      # Shared with the bridge-stack — ``caddy-internal`` writes its
      # certs into caddy_data, but the WAF's own runtime state
      # (autosave, persisted config) lives in caddy_config. caddy_logs
      # is what /actions/get-logs / alloy tail through this kit.
      # NOTE: no /etc/caddy/Caddyfile bind-mount — the image ships a
      # default at /etc/caddy/Caddyfile (config-init/Caddyfile via
      # the Dockerfile symlink). The bridge replaces the active
      # config via `POST /load` once the operator provisions it.
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    networks:
      - kit-admin
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      # orchestrator brings up the bridge stack (caddy-internal,
      # caddy-bridge, alloy, valkey) and creates the shared external
      # volumes. Waiting on it gives us valkey + the volumes before
      # the WAF starts.
      orchestrator:
        condition: service_completed_successfully
    labels:
      # caddy-bridge discovers its target by these labels — and
      # ONLY these labels (the heuristic "any container with caddy in
      # the image" matched caddy-internal too, which is wrong; the
      # docker_controller fix in this round filters strictly on
      # the pair below).
      corewaf.io/managed: "true"
      corewaf.io/role: "caddy-waf"
      corewaf.io/admin-port: "2019"
      # Alloy picks these up via docker-label discovery and turns this
      # container into a metrics + logs target. Mirrors the bridge-
      # stack pattern.
      prometheus.io/scrape: "true"
      prometheus.io/port: "2019"
      prometheus.io/path: /metrics
      loki.io/scrape: "true"
    logging: *x-default-logging
